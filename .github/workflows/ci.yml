# Continuous Integration — Firefly (Rust workspace).
#
# Runs the same quality gates the charter (CLAUDE.md §5) requires, on every push
# to main and every pull request against main: formatting, clippy (warnings are
# errors), and the full workspace test suite. --locked pins dependencies to the
# committed Cargo.lock so CI is reproducible and a stale lockfile fails loudly.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

# A newer push to the same ref cancels the older, still-running CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches the cargo registry and target/ dir keyed on Cargo.lock — the
      # second run onward is much faster.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting (cargo fmt --check)
        run: cargo fmt --all --check

      - name: Lint (cargo clippy, warnings = errors)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Tests (cargo test --workspace)
        run: cargo test --workspace --locked

  # Coverage-guided fuzzing of the trust-boundary parsers (QW.2, fuzz/README.md):
  # CAT048/062/063/065 decoders + the FIREFLY_SOURCES parser. Time-boxed to 60 s
  # per target — a regression net against panics on hostile input, not a
  # replacement for long local runs. Needs nightly (libFuzzer instrumentation),
  # which is why the fuzz crate lives outside the stable workspace.
  fuzz:
    name: Fuzz (time-boxed, nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo build (fuzz workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz each target (60 s, seeded corpus)
        run: |
          for target in $(cargo fuzz list); do
            echo "::group::fuzz $target"
            mkdir -p "fuzz/corpus/$target"
            cargo fuzz run "$target" "fuzz/corpus/$target" "fuzz/seeds/$target" \
              -- -max_total_time=60 -rss_limit_mb=4096
            echo "::endgroup::"
          done

      # A found panic input is the most valuable output of this job — keep it.
      - name: Upload crash artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore
