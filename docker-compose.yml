version: '3.8'

services:
  firefly-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Choose the scenario: "demo" (two aircraft) or "frankfurt" (showcase).
      FIREFLY_SCENE: ${FIREFLY_SCENE:-demo}
      # Structured logging; set to "debug" for verbose output.
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Optional: A reverse proxy (nginx) for production deployments.
  # Uncomment to enable (requires nginx.conf).
