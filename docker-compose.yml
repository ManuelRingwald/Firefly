version: '3.8'

services:
  firefly-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Live sources (ADR 0023): either the orchestrated FIREFLY_SOURCES JSON or
      # the standalone per-adapter env config. With nothing set the server runs
      # an idle tracker: empty sky + CAT065 heartbeat (ADR 0030). Example:
      #   FIREFLY_OPENSKY_ENABLED: "true"
      #   FIREFLY_OPENSKY_LAT_MIN: "49.0"   # …_LAT_MAX/_LON_MIN/_LON_MAX
      #   FIREFLY_OPENSKY_CLIENT_ID: "client_id"          # OAuth2 (ADR 0024)
      #   FIREFLY_OPENSKY_CLIENT_SECRET: "client_secret"
      FIREFLY_SOURCES: ${FIREFLY_SOURCES:-}
      # CAT062/065/063 multicast feed (off by default; the wire contract with
      # the ASD — docs/ICD-CAT062.md):
      #   FIREFLY_CAT062_ENABLED: "true"
      # Structured logging; set to "debug" for verbose output.
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Optional: A reverse proxy (nginx) for production deployments.
  # Uncomment to enable (requires nginx.conf).
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs/:/etc/nginx/certs/:ro
  #   depends_on:
  #     - firefly-server
  #   restart: unless-stopped
