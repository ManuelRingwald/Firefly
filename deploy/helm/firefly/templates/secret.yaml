{{- if and .Values.secrets (not .Values.existingSecret) }}
# Inline secrets are a lab convenience; production should manage its own
# Secret and set existingSecret instead (values files end up in VCS/CI).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-firefly-secrets
  labels:
    {{- include "firefly.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
