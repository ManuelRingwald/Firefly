# Firefly main/standby pair for plain `kubectl apply` (HA.3).
#
# This mirrors the Helm chart's defaults (deploy/helm/firefly) with plain
# names — use the chart if you can; keep this file when you cannot run
# Helm. The shape encodes the ADR 0040/0041 operational prerequisites:
# identical config on both instances (one ConfigMap), a SHARED snapshot
# volume, restart-by-design (Deployments), readiness-based routing, and
# hostNetwork + anti-affinity for the multicast feed (ADR 0017).
#
# Before applying: set image, FIREFLY_SOURCES and (if used) the Secret.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: firefly-env
  labels:
    app.kubernetes.io/name: firefly
data:
  FIREFLY_CAT062_ENABLED: "true"
  FIREFLY_SNAPSHOT_PATH: /var/lib/firefly/state.json
  RUST_LOG: info
  # FIREFLY_SOURCES: '[{"type":"radar_asterix","sac":25,"sic":10,...}]'
  # FIREFLY_FAILOVER_TIMEOUT: "3"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: firefly-snapshot
  labels:
    app.kubernetes.io/name: firefly
spec:
  # ReadWriteMany (NFS & co.): main writes, standby restores at takeover,
  # and the hostNetwork anti-affinity puts them on different nodes.
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly-main
  labels:
    app.kubernetes.io/name: firefly
    app.kubernetes.io/component: main
spec:
  replicas: 1
  strategy:
    type: Recreate # two simultaneous mains during a rollout = self-made split brain
  selector:
    matchLabels:
      app.kubernetes.io/name: firefly
      app.kubernetes.io/component: main
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firefly
        app.kubernetes.io/component: main
    spec:
      terminationGracePeriodSeconds: 20
      hostNetwork: true # multicast feed on the node's interfaces (ADR 0017)
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: firefly
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: firefly
          image: firefly-server:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: FIREFLY_ROLE
              value: main
          envFrom:
            - configMapRef:
                name: firefly-env
            # - secretRef:
            #     name: firefly-secrets   # FIREFLY_WS_TOKEN, FIREFLY_SOURCE_*_SECRET
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /ready, port: http }
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "2", memory: 1Gi }
          volumeMounts:
            - name: snapshot
              mountPath: /var/lib/firefly
      volumes:
        - name: snapshot
          persistentVolumeClaim:
            claimName: firefly-snapshot
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly-standby
  labels:
    app.kubernetes.io/name: firefly
    app.kubernetes.io/component: standby
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: firefly
      app.kubernetes.io/component: standby
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firefly
        app.kubernetes.io/component: standby
    spec:
      terminationGracePeriodSeconds: 20
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: firefly
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: firefly
          image: firefly-server:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: FIREFLY_ROLE
              value: standby
          envFrom:
            - configMapRef:
                name: firefly-env
            # - secretRef:
            #     name: firefly-secrets
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
            failureThreshold: 3
          # Deliberately "never ready" until promotion: /ready answers 503
          # "standby" — the shared Service therefore never routes here.
          readinessProbe:
            httpGet: { path: /ready, port: http }
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "2", memory: 1Gi }
          volumeMounts:
            - name: snapshot
              mountPath: /var/lib/firefly
      volumes:
        - name: snapshot
          persistentVolumeClaim:
            claimName: firefly-snapshot
---
# One Service over BOTH deployments: readiness does the routing, so
# traffic always reaches exactly the active instance — including through
# a failover, hands-off.
apiVersion: v1
kind: Service
metadata:
  name: firefly
  labels:
    app.kubernetes.io/name: firefly
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: firefly
  ports:
    - name: http
      port: 8080
      targetPort: http
