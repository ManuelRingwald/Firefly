<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Firefly — live air picture</title>

<!-- MapLibre GL JS from CDN (external request; see ADR 0009). -->
<link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  #map { position: absolute; inset: 0; }
  #hud {
    position: absolute; top: 10px; left: 10px; z-index: 1;
    background: rgba(20, 24, 32, 0.82); color: #e8eef6;
    padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4); min-width: 180px;
  }
  #hud h1 { font-size: 14px; margin: 0 0 6px; letter-spacing: 0.04em; }
  #hud .row { display: flex; justify-content: space-between; gap: 16px; }
  #hud .k { color: #9fb0c4; }
  #legend { margin-top: 8px; border-top: 1px solid #33414f; padding-top: 6px; }
  #legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  #status.live { color: #58d68d; }
  #status.done { color: #f5b041; }
  .layer-toggle {
    margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap;
  }
  .layer-toggle button {
    flex: 1; min-width: 60px; padding: 4px 6px; font-size: 11px;
    background: #2a3543; color: #e8eef6; border: 1px solid #44566b;
    border-radius: 4px; cursor: pointer;
  }
  .layer-toggle button.active {
    background: #2196f3; border-color: #1976d2;
  }
  #delay-btn {
    width: 100%; padding: 6px 8px; font-size: 12px;
    background: #2a3543; color: #e8eef6; border: 1px solid #44566b;
    border-radius: 6px; cursor: pointer;
  }
  #delay-btn:disabled { opacity: 0.5; cursor: default; }
  #delay-banner {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 1; background: rgba(245, 176, 65, 0.92); color: #1a1406;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4); display: none;
  }
  .track-label {
    font-size: 11px; color: #e8eef6; white-space: nowrap;
    text-shadow: 0 0 2px #0b0e13, 0 0 2px #0b0e13, 0 0 2px #0b0e13;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="hud">
  <h1>FIREFLY — live air picture</h1>
  <div class="row"><span class="k">Status</span><span id="status">connecting…</span></div>
  <div class="row"><span class="k">Data time</span><span id="clock">—</span></div>
  <div class="row"><span class="k">Sensor</span><span id="sensor">—</span></div>
  <div class="row"><span class="k">Tracks</span><span id="count">0</span></div>
  <div id="legend">
    <div><span class="dot" style="background:#2196f3"></span>confirmed</div>
    <div><span class="dot" style="background:#9e9e9e"></span>tentative</div>
    <div><span class="dot" style="background:#ff9800"></span>coasting (dashed = uncertainty)</div>
  </div>
  <div class="layer-toggle">
    <button id="btn-airspaces" class="active">airspaces</button>
    <button id="btn-plots">raw plots</button>
  </div>
  <button id="delay-btn" type="button">Verzug simulieren (5 s)</button>
</div>
<div id="delay-banner">Zustellung verzögert — Tracks werden extrapoliert (Dead-Reckoning), dann eingerastet…</div>

<script>
  // A track is only shown as "coasting" once it has gone without a fresh
  // measurement for longer than one scan cycle (default scan_period is 4 s;
  // see ADR 0012). Below this, a missed single-radar scan in a multi-radar
  // setup is normal and not worth flagging to the user.
  const COAST_DISPLAY_THRESHOLD_S = 5.0;

  // ---- Map ----------------------------------------------------------------
  // Inline MapLibre style: OpenStreetMap tiles + airspace overlays.
  const mapStyle = {
    version: 8,
    sources: {
      'osm-tiles': {
        type: 'raster',
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        tileSize: 256,
        minzoom: 0,
        maxzoom: 19,
      },
    },
    layers: [
      {
        id: 'background',
        type: 'background',
        paint: { 'background-color': '#e8e0d0' },
      },
      {
        id: 'osm-raster',
        type: 'raster',
        source: 'osm-tiles',
        minzoom: 0,
        maxzoom: 19,
      },
    ],
  };

  const map = new maplibregl.Map({
    container: 'map',
    style: mapStyle,
    center: [11.0, 48.0], // scene origin; we fit to the tracks on first frame
    zoom: 5.5,
  });

  // ---- Geometry helpers ---------------------------------------------------
  // Approximate local metres → lon/lat offset (good enough for display).
  function offset(lng, lat, dEast, dNorth) {
    const dLat = dNorth / 110540.0;
    const dLng = dEast / (111320.0 * Math.cos(lat * Math.PI / 180.0));
    return [lng + dLng, lat + dLat];
  }

  // A closed ring approximating a circle of `radiusM` around [lng, lat].
  function ring(lng, lat, radiusM, steps = 48) {
    const coords = [];
    for (let i = 0; i <= steps; i++) {
      const a = (i / steps) * 2 * Math.PI;
      coords.push(offset(lng, lat, radiusM * Math.sin(a), radiusM * Math.cos(a)));
    }
    return coords;
  }

  // A short leader line along the course, length proportional to speed
  // (where the track would be in `LOOKAHEAD_S` seconds of straight flight).
  const LOOKAHEAD_S = 60.0;
  function velocityLine(lng, lat, courseDeg, speedMps) {
    const dist = speedMps * LOOKAHEAD_S;
    const a = courseDeg * Math.PI / 180.0;
    const end = offset(lng, lat, dist * Math.sin(a), dist * Math.cos(a));
    return [[lng, lat], end];
  }

  // ---- Sources & layers ---------------------------------------------------
  const EMPTY = { type: 'FeatureCollection', features: [] };
  let airspacesLoaded = false;

  function addLayers() {
    // Airspaces source (initially empty, loaded asynchronously).
    map.addSource('airspaces', { type: 'geojson', data: EMPTY });
    // Raw radar plots (M6.3): input to the tracker, before association.
    map.addSource('plots', { type: 'geojson', data: EMPTY });
    map.addSource('uncertainty', { type: 'geojson', data: EMPTY });
    map.addSource('velocity', { type: 'geojson', data: EMPTY });
    map.addSource('tracks', { type: 'geojson', data: EMPTY });

    // Airspaces overlay: TMA, CTR, restricted areas (from OpenAIP or local GeoJSON).
    map.addLayer({
      id: 'airspaces-fill', type: 'fill', source: 'airspaces',
      paint: { 'fill-color': '#7c3aed', 'fill-opacity': 0.1 },
    });
    map.addLayer({
      id: 'airspaces-outline', type: 'line', source: 'airspaces',
      paint: { 'line-color': '#7c3aed', 'line-width': 1.2, 'line-opacity': 0.6 },
    });

    // Raw radar plots (M6.3): small marker for each detection (input to tracker).
    map.addLayer({
      id: 'plot-marker', type: 'circle', source: 'plots',
      paint: {
        'circle-radius': 3,
        'circle-color': '#ef4444',
        'circle-opacity': 0.6,
      },
    });

    // Uncertainty ring — solid when fresh, dashed when coasting (two layers
    // because line-dasharray cannot be data-driven per feature).
    map.addLayer({
      id: 'unc-fresh', type: 'line', source: 'uncertainty',
      filter: ['!', ['get', 'coasting']],
      paint: { 'line-color': '#7fb0ff', 'line-width': 1.2, 'line-opacity': 0.8 },
    });
    map.addLayer({
      id: 'unc-coast', type: 'line', source: 'uncertainty',
      filter: ['get', 'coasting'],
      paint: { 'line-color': '#ff9800', 'line-width': 1.4, 'line-dasharray': [2, 2], 'line-opacity': 0.9 },
    });

    // Velocity leader.
    map.addLayer({
      id: 'vel', type: 'line', source: 'velocity',
      paint: { 'line-color': '#cdd9e5', 'line-width': 1.5, 'line-opacity': 0.7 },
    });

    // Track dot, coloured by status.
    map.addLayer({
      id: 'track-dot', type: 'circle', source: 'tracks',
      paint: {
        'circle-radius': 5,
        'circle-color': ['case',
          ['get', 'coasting'], '#ff9800',
          ['get', 'confirmed'], '#2196f3',
          '#9e9e9e'],
        'circle-stroke-color': '#0b0e13',
        'circle-stroke-width': 1.5,
      },
    });

    // Track labels (id + speed) are rendered as HTML markers (see
    // `updateLabels` below), not MapLibre symbol/text layers — this avoids
    // depending on an external glyphs (font) server entirely.
  }

  // ---- Track labels (HTML markers, no glyphs server needed) ---------------
  // One DOM marker per track id, repositioned/relabelled each frame; markers
  // for tracks that vanished (left coverage, merged, deleted) are removed.
  const labelMarkers = new Map();

  function updateLabels(tracks) {
    const seen = new Set();
    for (const t of tracks) {
      seen.add(t.id);
      const text = `#${t.id}  ${Math.round(t.ground_speed_mps)} m/s`;
      let marker = labelMarkers.get(t.id);
      if (!marker) {
        const el = document.createElement('div');
        el.className = 'track-label';
        marker = new maplibregl.Marker({ element: el, anchor: 'top', offset: [0, 8] });
        marker.setLngLat([t.lon_deg, t.lat_deg]);
        marker.addTo(map);
        labelMarkers.set(t.id, marker);
      } else {
        marker.setLngLat([t.lon_deg, t.lat_deg]);
      }
      marker.getElement().textContent = text;
    }
    for (const [id, marker] of labelMarkers) {
      if (!seen.has(id)) {
        marker.remove();
        labelMarkers.delete(id);
      }
    }
  }

  // ---- Airspaces (M6.2) ---------------------------------------------------
  function toggleAirspaces() {
    if (!airspacesLoaded) {
      fetch('/airspaces.geojson')
        .then(r => r.json())
        .then(data => {
          map.getSource('airspaces').setData(data);
          airspacesLoaded = true;
        })
        .catch(e => console.error('Failed to load airspaces:', e));
    }
    const visible = map.getLayoutProperty('airspaces-fill', 'visibility') === 'visible';
    map.setLayoutProperty('airspaces-fill', 'visibility', visible ? 'none' : 'visible');
    map.setLayoutProperty('airspaces-outline', 'visibility', visible ? 'none' : 'visible');
  }

  // ---- Plots layer (M6.3) -------------------------------------------------
  function togglePlots() {
    const visible = map.getLayoutProperty('plot-marker', 'visibility') === 'visible';
    map.setLayoutProperty('plot-marker', 'visibility', visible ? 'none' : 'visible');
  }

  // ---- Live stream --------------------------------------------------------
  let fitted = false;
  let socket = null;
  const statusEl = document.getElementById('status');
  const clockEl = document.getElementById('clock');
  const sensorEl = document.getElementById('sensor');
  const countEl = document.getElementById('count');
  const airspacesBtn = document.getElementById('btn-airspaces');
  const plotsBtn = document.getElementById('btn-plots');
  const delayBtn = document.getElementById('delay-btn');
  const delayBanner = document.getElementById('delay-banner');

  airspacesBtn.addEventListener('click', () => {
    toggleAirspaces();
    airspacesBtn.classList.toggle('active');
  });

  plotsBtn.addEventListener('click', () => {
    togglePlots();
    plotsBtn.classList.toggle('active');
  });

  // Ask the server to pause delivery for a few seconds (NFR-CLOUD-004): the
  // tracks resume exactly where data-time says they should — nothing here
  // touches the tracker, only how fast we *receive* its output.
  delayBtn.addEventListener('click', () => {
    if (socket && socket.readyState === WebSocket.OPEN) {
      socket.send('delay');
    }
  });

  function showDelayBanner(durationS) {
    delayBanner.style.display = 'block';
    delayBtn.disabled = true;
    setTimeout(() => {
      delayBanner.style.display = 'none';
      delayBtn.disabled = false;
    }, durationS * 1000);
  }

  // ---- Dead-reckoning during a delivery delay -----------------------------
  // While the server pauses *delivery* (the "delay" demo), no fresh frames
  // arrive — but the real aircraft keep flying. Rather than freeze the picture,
  // we extrapolate (dead-reckon) each track forward from its last known
  // velocity, so the symbols keep gliding. When delivery resumes, the server's
  // absolute pacing has caught the schedule up to the present, so the next real
  // frame *snaps* the tracks to where they truly are (NFR-CLOUD-004). This is a
  // display-only bridge; the track data itself is never altered.
  let lastTracks = [];
  let lastTime = 0;
  const deadReckon = { active: false, raf: 0 };

  function stopDeadReckoning() {
    deadReckon.active = false;
    if (deadReckon.raf) { cancelAnimationFrame(deadReckon.raf); deadReckon.raf = 0; }
  }

  function startDeadReckoning(speed) {
    stopDeadReckoning();
    const baseTracks = lastTracks;
    const baseTime = lastTime;
    const start = performance.now();
    deadReckon.active = true;
    const tick = () => {
      if (!deadReckon.active) return;
      const wallElapsed = (performance.now() - start) / 1000;
      const dataElapsed = wallElapsed * speed;   // data-seconds advanced so far
      const extrapolated = baseTracks.map(t => {
        const dist = t.ground_speed_mps * dataElapsed;
        const a = t.track_angle_deg * Math.PI / 180.0;
        const [lng, lat] = offset(t.lon_deg, t.lat_deg, dist * Math.sin(a), dist * Math.cos(a));
        return { ...t, lon_deg: lng, lat_deg: lat };
      });
      drawTracks(extrapolated, baseTime + dataElapsed);
      deadReckon.raf = requestAnimationFrame(tick);
    };
    deadReckon.raf = requestAnimationFrame(tick);
  }

  // Draw the track dots, uncertainty rings, velocity leaders and labels for a
  // list of tracks, and update the clock/count. Shared by live frames and the
  // dead-reckoning loop so both look identical.
  function drawTracks(trackList, clockTime) {
    const tracks = [], unc = [], vel = [];
    for (const t of trackList) {
      const lng = t.lon_deg, lat = t.lat_deg;
      // With multiple radars on staggered scan cycles, a track is reported
      // as "coasting" in any frame where *that particular* radar didn't see
      // it — even though another radar refreshed it moments before. Showing
      // that raw per-scan flag makes confirmed tracks flicker orange/blue at
      // the scan rate. Instead, only show "coasting" once a track has gone
      // without any fresh measurement for longer than one scan cycle.
      const displayCoasting = t.update_age_s > COAST_DISPLAY_THRESHOLD_S;
      tracks.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: {
          id: t.id, confirmed: t.confirmed, coasting: displayCoasting,
          speed: Math.round(t.ground_speed_mps), age: t.update_age_s,
        },
      });
      unc.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: ring(lng, lat, Math.max(t.position_uncertainty_m, 1)) },
        properties: { coasting: displayCoasting },
      });
      vel.push({
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: velocityLine(lng, lat, t.track_angle_deg, t.ground_speed_mps) },
        properties: {},
      });
    }

    map.getSource('tracks').setData({ type: 'FeatureCollection', features: tracks });
    map.getSource('uncertainty').setData({ type: 'FeatureCollection', features: unc });
    map.getSource('velocity').setData({ type: 'FeatureCollection', features: vel });
    updateLabels(trackList);

    clockEl.textContent = `${clockTime.toFixed(1)} s`;
    countEl.textContent = trackList.length;
  }

  function render(frame) {
    // A real frame arrived: stop any dead-reckoning and snap to the truth.
    stopDeadReckoning();
    lastTracks = frame.tracks;
    lastTime = frame.time;

    const plots = [];
    for (const p of (frame.plots || [])) {
      plots.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [p.lon_deg, p.lat_deg] },
        properties: { has_ssr: p.has_ssr },
      });
    }
    map.getSource('plots').setData({ type: 'FeatureCollection', features: plots });

    drawTracks(frame.tracks, frame.time);
    sensorEl.textContent = frame.sensor;

    // Fit the view to the first frame that has tracks.
    if (!fitted && frame.tracks.length > 0) {
      const lons = frame.tracks.map(t => t.lon_deg), lats = frame.tracks.map(t => t.lat_deg);
      map.fitBounds([[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]],
        { padding: 120, maxZoom: 9, duration: 0 });
      fitted = true;
    }
  }

  function connect() {
    socket = new WebSocket(`ws://${location.host}/ws`);
    socket.onopen = () => { statusEl.textContent = 'live'; statusEl.className = 'live'; };
    socket.onclose = () => { statusEl.textContent = 'stream complete'; statusEl.className = 'done'; };
    socket.onerror = () => { statusEl.textContent = 'connection error'; statusEl.className = 'done'; };
    socket.onmessage = (ev) => {
      const data = JSON.parse(ev.data);
      if (data.event === 'delay_triggered') {
        showDelayBanner(data.duration_s);
        // Bridge the delivery gap by extrapolating the tracks forward at the
        // playback speed; the next real frame will snap them back to truth.
        startDeadReckoning(data.speed || 1.0);
      } else {
        render(data);
      }
    };
  }

  map.on('load', () => { addLayers(); connect(); });
</script>
</body>
</html>
